<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2453d"/>
    </marker>
    <marker id="ar-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f9d8f"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#fbfaf7"/>

  <!-- divider -->
  <line x1="480" y1="60" x2="480" y2="430" stroke="#d9dde6" stroke-width="1.5" stroke-dasharray="3 5"/>

  <!-- ============ LEFT: zero-sum war ============ -->
  <text x="50" y="46" font-size="22" font-weight="700" fill="#1a1f2e">Zero-sum war</text>
  <text x="50" y="68" font-size="14" fill="#5b6478">Chains fight over one shrinking pie</text>

  <!-- shrinking pie in middle -->
  <circle cx="240" cy="250" r="58" fill="#f3e6e4" stroke="#c2453d" stroke-width="1.5"/>
  <circle cx="240" cy="250" r="34" fill="#fbfaf7" stroke="#c2453d" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="240" y="246" font-size="12" font-weight="700" fill="#c2453d" text-anchor="middle">FIXED</text>
  <text x="240" y="262" font-size="12" font-weight="700" fill="#c2453d" text-anchor="middle">PRIZE</text>

  <!-- four chains as boxes around, arrows colliding inward -->
  <g fill="#fff" stroke="#c2453d" stroke-width="1.5">
    <rect x="110" y="110" width="78" height="40" rx="6"/>
    <rect x="292" y="110" width="78" height="40" rx="6"/>
    <rect x="110" y="350" width="78" height="40" rx="6"/>
    <rect x="292" y="350" width="78" height="40" rx="6"/>
  </g>
  <g font-size="13" fill="#1a1f2e" text-anchor="middle" font-weight="600">
    <text x="149" y="135">Chain A</text>
    <text x="331" y="135">Chain B</text>
    <text x="149" y="375">Chain C</text>
    <text x="331" y="375">Chain D</text>
  </g>
  <!-- arrows attacking each other + the pie -->
  <g stroke="#c2453d" stroke-width="2" fill="none" marker-end="url(#ar-red)">
    <path d="M170,152 L222,212"/>
    <path d="M310,152 L258,212"/>
    <path d="M170,348 L222,288"/>
    <path d="M310,348 L258,288"/>
    <path d="M192,128 L290,128"/>
    <path d="M290,140 L192,140"/>
    <path d="M192,372 L290,372"/>
    <path d="M290,360 L192,360"/>
  </g>
  <text x="240" y="430" font-size="13" fill="#c2453d" text-anchor="middle" font-style="italic">someone wins, the rest lose — value is destroyed or just moved</text>

  <!-- ============ RIGHT: accretion ============ -->
  <text x="510" y="46" font-size="22" font-weight="700" fill="#1a1f2e">Noesis accretion</text>
  <text x="510" y="68" font-size="14" fill="#5b6478">Contributions flow into one growing graph</text>

  <!-- growing graph in middle: hexagon cluster -->
  <g>
    <polygon points="720,210 745,225 745,255 720,270 695,255 695,225" fill="#1f9d8f" opacity="0.9"/>
    <polygon points="690,240 715,255 715,285 690,300 665,285 665,255" fill="#27b3a3" opacity="0.9"/>
    <polygon points="750,240 775,255 775,285 750,300 725,285 725,255" fill="#27b3a3" opacity="0.9"/>
    <polygon points="720,270 745,285 745,315 720,330 695,315 695,285" fill="#1f9d8f" opacity="0.9"/>
  </g>
  <text x="720" y="268" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ONE</text>
  <text x="720" y="282" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">GRAPH</text>

  <!-- four chains as puzzle-ish pieces flowing IN -->
  <g fill="#e9f4f2" stroke="#1f9d8f" stroke-width="1.5">
    <rect x="540" y="110" width="78" height="40" rx="6"/>
    <rect x="822" y="110" width="78" height="40" rx="6"/>
    <rect x="540" y="350" width="78" height="40" rx="6"/>
    <rect x="822" y="350" width="78" height="40" rx="6"/>
  </g>
  <g font-size="13" fill="#1a1f2e" text-anchor="middle" font-weight="600">
    <text x="579" y="135">Chain A</text>
    <text x="861" y="135">Chain B</text>
    <text x="579" y="375">Chain C</text>
    <text x="861" y="375">Chain D</text>
  </g>
  <!-- arrows flowing INTO the graph, none colliding -->
  <g stroke="#1f9d8f" stroke-width="2.5" fill="none" marker-end="url(#ar-teal)">
    <path d="M600,150 Q650,200 685,235"/>
    <path d="M840,150 Q790,200 755,235"/>
    <path d="M600,350 Q650,300 685,305"/>
    <path d="M840,350 Q790,300 755,305"/>
  </g>
  <text x="720" y="430" font-size="13" fill="#1f9d8f" text-anchor="middle" font-style="italic">nothing is taken — every chain's work is kept and added in</text>
</svg>
