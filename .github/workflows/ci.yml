name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: host suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo test (workspace)
        run: cargo test --workspace

  type-scripts:
    name: on-VM type-scripts (RISC-V)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [pom-typescript, finalization-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned nightly + riscv target
        run: |
          rustup toolchain install nightly-2024-09-01 --profile minimal \
            --component rust-src llvm-tools-preview
          rustup target add riscv64imac-unknown-none-elf \
            --toolchain nightly-2024-09-01
      - name: Build ${{ matrix.crate }}
        working-directory: onchain/${{ matrix.crate }}
        run: cargo build --release --target riscv64imac-unknown-none-elf
